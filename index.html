<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
/* =======================
   BASE
======================= */
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#1e1e2f,#12121a);
  color:#fff;
  text-align:center;
}

h2{margin-top:20px;font-weight:600;letter-spacing:1px}

/* =======================
   GRID
======================= */
#image-list{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin:30px;
}

.item{
  background:#2a2a40;
  border-radius:12px;
  padding:6px;
  box-shadow:0 4px 10px rgba(0,0,0,.5);
  transition:.2s;
}
.item:hover{
  transform:scale(1.05);
  box-shadow:0 6px 18px rgba(0,255,255,.4);
}
.item img{width:100%;border-radius:8px}

/* =======================
   BUTTON
======================= */
.glow-button{
  margin:30px;
  padding:12px 28px;
  font-size:16px;
  font-weight:bold;
  border:none;
  border-radius:25px;
  background:linear-gradient(90deg,#00f5ff,#00ffa3);
  color:#000;
  cursor:pointer;
  transition:.3s;
}
.glow-button:hover{
  transform:scale(1.08);
  box-shadow:0 0 15px #00ffa3;
}

/* =======================
   TIMER
======================= */
.timer-container{
  width:90%;
  max-width:800px;
  height:20px;
  background:rgba(255,255,255,.1);
  border-radius:10px;
  margin:20px auto;
  overflow:hidden;
}
.timer-bar{
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#00f5ff,#00ffa3);
}

/* =======================
   RESULT
======================= */
.result-screen{padding:40px 20px}
.result-title{
  font-size:34px;
  font-weight:700;
  margin-bottom:30px;
  letter-spacing:2px;
  color:#00ffe5;
  text-shadow:0 0 8px #00ffe5;
}

.result-container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:25px;
}

.result-card{
  width:95%;
  max-width:1000px;
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(8px);
  border-radius:20px;
  padding:30px;
  box-shadow:0 0 20px rgba(0,255,200,.25);
}

.result-order{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
}

.badge{
  min-width:34px;
  height:34px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:14px;
  background:linear-gradient(145deg,#00f5ff,#00ffa3);
  color:#000;
  box-shadow:0 0 8px rgba(0,255,200,.6);
}

.badge.mismatch{
  background:linear-gradient(145deg,#ff9b9b,#c40000);
  color:#fff;
}

.badge.correct{
  outline:3px solid gold;
  box-shadow:0 0 12px gold;
}
</style>
</head>

<body>

<script>
/* =======================
   STATE
======================= */
const imageSets = [
  Array.from({length:15},(_,i)=>`set1/img${i+1}.png`),
  Array.from({length:15},(_,i)=>`set2/img${i+1}.png`)
];

let currentSet=0;
let results=[];
let sortableInstance=null;
let timerInterval=null;

const TIME_LIMIT=45;
let remainingTime=TIME_LIMIT;

/* =======================
   START SCREEN
======================= */
function showStartScreen(){
  document.body.innerHTML=`
    <div style="padding:100px">
      <h1>Image Sorting Game</h1>
      <p>Sort the images from rough texture to fine texture. Time limit is 45 seconds per dataset. We have two datasets, so you will try twice.</p>
      <button class="glow-button" onclick="startGame()">START</button>
    </div>`;
}

function startGame(){
  currentSet=0;
  results=[];
  renderGameUI();
  loadSet();
  resetTimerInstant();
  startTimer();
}

/* =======================
   GAME UI
======================= */
function renderGameUI(){
  document.body.innerHTML=`
    <h2 id="title">Set ${currentSet+1}</h2>

    <div class="timer-container">
      <div class="timer-bar" id="timer-bar"></div>
    </div>

    <div id="image-list"></div>
    <button class="glow-button" onclick="submitOrder()">Done</button>`;
}

/* =======================
   TIMER
======================= */
function startTimer(){
  const bar=document.getElementById("timer-bar");

  bar.style.transition="width 1s linear";

  timerInterval=setInterval(()=>{
    remainingTime--;

    bar.style.width=(remainingTime/TIME_LIMIT*100)+"%";

    if(remainingTime<=0){
      clearInterval(timerInterval);
      submitOrder();
    }
  },1000);
}

function resetTimerInstant(){
  const bar=document.getElementById("timer-bar");
  bar.style.transition="none";
  bar.style.width="100%";
  remainingTime=TIME_LIMIT;

  // 次フレームでtransition復活
  setTimeout(()=>{
    bar.style.transition="width 1s linear";
  },20);
}

/* =======================
   IMAGE
======================= */
function shuffle(array){
  return array
    .map((src,i)=>({src,index:i+1}))
    .sort(()=>Math.random()-0.5);
}

function loadSet(){
  const imageList=document.getElementById("image-list");
  imageList.innerHTML="";

  shuffle(imageSets[currentSet]).forEach(item=>{
    const div=document.createElement("div");
    div.className="item";
    div.dataset.index=item.index;
    div.innerHTML=`<img src="${item.src}">`;
    imageList.appendChild(div);
  });

  if(sortableInstance) sortableInstance.destroy();
  sortableInstance=new Sortable(imageList,{animation:150});
}

/* =======================
   SUBMIT
======================= */
function submitOrder(){
  clearInterval(timerInterval);

  const items=document.querySelectorAll(".item");
  const order=[...items].map(el=>Number(el.dataset.index));

  results.push(order);
  currentSet++;

  if(currentSet<imageSets.length){
    document.getElementById("title").innerText=`Set ${currentSet+1}`;
    loadSet();
    resetTimerInstant();
    startTimer();
  }else{
    showResults();
  }
}

/* =======================
   RESULT
======================= */
function showResults(){
  const [first,second]=results;

  document.body.innerHTML=`
  <div class="result-screen">
    <div class="result-title">RESULT</div>

    <div class="result-container">
      ${createResultCard("First Trial",first,second)}
      ${createResultCard("Second Trial",second,first)}
    </div>

    <button class="glow-button" onclick="showStartScreen()">
      PLAY AGAIN
    </button>
  </div>`;
}

function createResultCard(title,data,other){
  return `
    <div class="result-card">
      <h3>${title}</h3>
      <div class="result-order">
        ${data.map((n,i)=>{
          const mismatch = data[i]!==other[i];
          const correct = n===i+1;
          return `
            <div class="badge 
              ${mismatch?"mismatch":""} 
              ${correct?"correct":""}">
              ${n}
            </div>`;
        }).join("")}
      </div>
    </div>`;
}

/* =======================
   INIT
======================= */
showStartScreen();
</script>

</body>
</html>
